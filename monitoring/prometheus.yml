global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "producer"
    # Use the Docker Compose service name, not localhost.
    # Prometheus runs inside Docker and resolves service names via Docker DNS.
    static_configs:
      - targets: ["producer:8000"]
    metrics_path: "/metrics"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
